<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>글 작성하기</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header><h1>새 글 작성</h1></header>
    <form id="post-form">
      <input type="text" id="title" placeholder="제목" required /><br />
      <input type="text" id="nickname" placeholder="닉네임" required /><br />
      <textarea id="content" placeholder="내용" required></textarea><br />
      <input type="text" id="tags" placeholder="태그 (쉼표로 구분)" /><br />
      <button type="submit">저장하기</button>
    </form>
    <script type="module" src="/src/write.js"></script>
  </body>
</html>
